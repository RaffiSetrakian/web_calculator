version: "1.0"
linter: jetbrains/qodana-js:2026.2-eap

bootstrap: mkdir -p .qodana/code-coverage && cp coverage/lcov.info .qodana/code-coverage/lcov.info

coverage:
  reportProblems: true
  codeCoverageLocations:
    - ".qodana/code-coverage"